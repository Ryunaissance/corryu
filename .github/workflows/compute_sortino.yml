name: Sortino 비율 재계산 (MAR=4%)

# ── 트리거 ──────────────────────────────────────────────────────────
on:
  # 수동 실행 — GitHub → Actions 탭 → 이 워크플로우 → "Run workflow"
  workflow_dispatch:

  # (선택) 매월 1일 03:00 UTC 자동 실행 — 필요 시 주석 해제
  # schedule:
  #   - cron: '0 3 1 * *'

jobs:
  sortino:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write   # etf_data.json 커밋·푸시 권한

    steps:
      # ── 1. 소스 체크아웃 ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python 환경 ────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --upgrade numpy pandas supabase

      # ── 3. Sortino 재계산 ─────────────────────────────────────────
      # Supabase에서 전체 ETF 가격 이력(adj_close) 조회 →
      # MAR=4% 기준 하방편차 계산 → output/etf_data.json 패치
      - name: Run compute_sortino.py
        run: python scripts/compute_sortino.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # ── 4. HTML 재생성 ────────────────────────────────────────────
      # etf_data.json → output/*.html (pandas 불필요, 순수 Python)
      - name: Regenerate HTML
        run: python render_html.py

      # ── 5. 변경사항 커밋·푸시 ────────────────────────────────────
      - name: Commit and push updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config merge.ours.driver true

          git add output/etf_data.json output/*.html etf_database.json

          if git diff --cached --quiet; then
            echo "변경사항 없음 — 커밋 생략"
          else
            git commit -m "feat: Sortino 재계산 (MAR=4%) [automated]"
            git push
          fi
